services:
  app:
    build: .
    container_name: checkmotor_app
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: America/Santiago
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      caddy_proxy:
        aliases:
          - checkmotor_app

  db:
    image: postgres:16-alpine
    container_name: checkmotor_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-checkmotor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Santiago
      PGTZ: America/Santiago
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  default:
    driver: bridge
  caddy_proxy:
    external: true
    name: caddy_proxy_net

volumes:
  postgres_data:
